<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 40vh; width: 100%; }
        #menu { padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; background: #eee; }
        .day-btn { padding: 8px; background: #fff; border: 1px solid #ccc; border-radius: 5px; flex: 1; text-align: center; font-size: 13px; }
        #info-panel { height: 50vh; overflow-y: auto; padding: 15px; background: #fff; }
        .item { padding: 15px; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; }
        b { color: #d32f2f; font-size: 16px; }
        .desc { font-size: 13px; color: #333; margin: 5px 0; line-height: 1.4; }
        .tip { font-size: 12px; color: #d84315; background: #fff3e0; padding: 5px; border-radius: 4px; margin: 5px 0; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .nav-btn { flex: 1; background-color: #4285F4; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
        .view-btn { flex: 1; background-color: #34a853; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
        .park-btn { flex: 100%; background-color: #ff9800; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="menu">
        <div class="day-btn" onclick="showDay('Day 1')">Day 1</div>
        <div class="day-btn" onclick="showDay('Day 2')">Day 2</div>
        <div class="day-btn" onclick="showDay('Day 3')">Day 3</div>
        <div class="day-btn" onclick="showDay('Day 4')">Day 4</div>
        <div class="day-btn" onclick="showDay('Day 5')">Day 5</div>
        <div class="day-btn" onclick="showDay('Day 6')">Day 6</div>
    </div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0;">請點選上方日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = [];

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", time: "起始", tel: "-", mapcode: "453 800 682*20", parking: "租車場", desc: "攞車及準備出發。", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", time: "40分", tel: "052-482-2428", mapcode: "4 163 118*66", parking: "免費位", desc: "正宗味噌烏冬。", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", time: "15分", tel: "052-211-8050", mapcode: "4 164 125*44", parking: "酒店場", desc: "Nikko Style Nagoya。", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "日航尚格酒店", time: "起始", tel: "052-211-8050", mapcode: "4 164 125*44", parking: "酒店場", desc: "出發前往樂高樂園。", lat: 35.1706, lng: 136.8920 },
                { name: "樂高樂園", time: "30分", tel: "0570-058-605", mapcode: "52 485 581*57", parking: "市營場 (限高)", desc: "親子必玩樂高園區。", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", time: "25分", tel: "052-321-9201", mapcode: "4 167 496*06", parking: "投幣場", desc: "夏日限定祭典。", lat: 35.1481, lng: 136.9011 }
            ],
            "Day 3": [
                { name: "愛知牧場", time: "45分", tel: "0561-72-1300", mapcode: "100 241 180*25", parking: "大型免費場", desc: "親親小動物。", lat: 35.1458, lng: 137.0817 },
                { name: "あつた蓬莱軒", time: "40分", tel: "052-682-5598", mapcode: "4 137 775*86", parking: "專屬停車區", desc: "鰻魚飯名店。", lat: 35.1264, lng: 136.9069 }
            ],
            "Day 4": [
                { name: "鈴鹿賽車場", time: "70分", tel: "059-378-1111", mapcode: "159 387 508*68", parking: "園區專用場", desc: "賽車主題公園。", lat: 34.8438, lng: 136.5333 },
                { name: "鈴鹿市酒店", time: "15分", tel: "-", mapcode: "-", parking: "酒店停車場", desc: "休息充電。", lat: 34.8735, lng: 136.5658 }
            ],
            "Day 5": [
                { name: "Mitoka 農園", time: "50分", tel: "0581-78-5556", mapcode: "178 304 630*81", parking: "免費車場", desc: "水果採摘。", lat: 35.5397, lng: 136.7871 },
                { name: "長島三井Outlet", time: "50分", tel: "0594-45-8700", mapcode: "4 191 190*33", parking: "立體場 (限高)", desc: "購物熱點。", lat: 35.0305, lng: 136.7350 }
            ],
            "Day 6": [
                { name: "常滑 AEON", time: "35分", tel: "0569-35-7500", mapcode: "205 383 671*88", parking: "商場免費場", desc: "最後衝刺。", lat: 34.8966, lng: 136.8288 },
                { name: "機場 (還車)", time: "10分", tel: "-", mapcode: "453 800 682*20", parking: "租車還車處", desc: "還車，買手信。", lat: 34.8583, lng: 136.8115 }
            ]
        };

        function showDay(day) {
            document.getElementById('panel-title').innerText = day + " 詳情";
            const details = document.getElementById('details');
            details.innerHTML = itinerary[day].map(loc => `
                <div class="item">
                    <b>${loc.name}</b> <small>(⏱ ${loc.time})</small>
                    <div class="desc">${loc.desc}</div>
                    <div class="tip">📍 ${loc.mapcode} | 📞 ${loc.tel} | 🅿️ ${loc.parking}</div>
                    <div class="btn-group">
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving" target="_blank" class="nav-btn">🚗 導航</a>
                        <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${loc.lat},${loc.lng}" target="_blank" class="view-btn">👀 實景</a>
                        <a href="https://www.google.com/maps/search/平置き駐車場+near+${loc.lat},${loc.lng}" target="_blank" class="park-btn">🅿️ 搵露天停車場</a>
                    </div>
                </div>
            `).join('');
            
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            itinerary[day].forEach(loc => {
                markers.push(L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(loc.name));
            });
            map.setView([itinerary[day][0].lat, itinerary[day][0].lng], 12);
        }
    </script>
</body>
</html>
