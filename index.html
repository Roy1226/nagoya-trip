<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋 6日自駕遊</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* 調整彈出視窗比例 */
        .leaflet-popup-content-wrapper { border-radius: 12px; width: 240px; }
        .leaflet-popup-content { margin: 10px; line-height: 1.3; }
        
        /* 縮小視窗內文字大小，讓版面更清爽 */
        .popup-content { font-size: 13px; }
        .popup-content b { display: block; margin-bottom: 4px; color: #d32f2f; font-size: 14px; }
        
        /* 導航按鈕美化 */
        .nav-btn { display: block; background-color: #4285F4; color: white !important; padding: 6px 0; margin-top: 8px; text-decoration: none; border-radius: 6px; font-weight: bold; text-align: center; }
        
        /* 右上角選單調整 */
        .leaflet-control-layers { font-size: 13px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OpenStreetMap' 
        }).addTo(map);

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", lat: 34.8583, lng: 136.8115, tel: "-", mapcode: "453 800 682*20", parking: "租車場" },
                { name: "山本屋本店", lat: 35.1743, lng: 136.8732, tel: "052-482-2428", mapcode: "4 163 118*66", parking: "免費位" },
                { name: "日航尚格酒店", lat: 35.1706, lng: 136.8920, tel: "052-211-8050", mapcode: "4 164 125*44", parking: "酒店場" }
            ],
            // ... (請確保這裡填入 Day 2-6)
        };

        Object.keys(itinerary).forEach(day => {
            const group = L.layerGroup();
            itinerary[day].forEach(loc => {
                const navUrl = `https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving`;
                L.marker([loc.lat, loc.lng]).addTo(group).bindPopup(`
                    <div class="popup-content">
                        <b>${loc.name}</b>
                        Mapcode: ${loc.mapcode}<br>
                        Tel: ${loc.tel}<br>
                        🅿️ ${loc.parking}
                        <a href="${navUrl}" target="_blank" class="nav-btn">🚗 導航至此</a>
                    </div>
                `);
            });
            group.addTo(map); // 預設顯示所有點，或改為使用 LayerControl
        });
    </script>
</body>
</html>
