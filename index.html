<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋 6日5夜親子自駕遊 (2026終極版)</title>
    
    <link rel="manifest" href="manifest.json">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => console.log('ServiceWorker 註冊成功'))
            .catch(err => console.log('ServiceWorker 註冊失敗: ', err));
        });
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 初始化地圖，中心點設定為名古屋市中心
        const map = L.map('map').setView([35.1676, 136.9060], 10);

        // 載入 OpenStreetMap 圖層
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 定義每日顏色
        const colors = {
            day1: '#FF5722', // 橙色
            day2: '#2196F3', // 藍色
            day3: '#4CAF50', // 綠色
            day4: '#9C27B0', // 紫色
            day5: '#E91E63', // 粉紅
            day6: '#607D8B'  // 灰藍
        };

        // Day 1 到 Day 6 嘅完整行程數據 (近似座標)
        const itinerary = {
            "Day 1: 抵達與榮區": {
                color: colors.day1,
                locations: [
                    { name: "✈️ 中部國際機場 (攞車)", lat: 34.8583, lng: 136.8115 },
                    { name: "🍜 山本屋本店 大門本店", lat: 35.1743, lng: 136.8732 },
                    { name: "🌃 Oasis 21 水之宇宙船", lat: 35.1706, lng: 136.9099 },
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 }
                ]
            },
            "Day 2: 樂高與夜市": {
                color: colors.day2,
                locations: [
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 },
                    { name: "🎢 樂高樂園 & SEA LIFE", lat: 35.0507, lng: 136.8436 },
                    { name: "🏮 東別院 夏日夜市", lat: 35.1481, lng: 136.9011 },
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 }
                ]
            },
            "Day 3: 牧場與公園放電": {
                color: colors.day3,
                locations: [
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 },
                    { name: "🪵 愛知牧場", lat: 35.1458, lng: 137.0817 },
                    { name: "🛍️ LaLaport 名古屋港明", lat: 35.1098, lng: 136.8836 },
                    { name: "🛝 戶田川綠地公園", lat: 35.1122, lng: 136.8143 },
                    { name: "🍱 あつた蓬莱軒 (神宮店)", lat: 35.1264, lng: 136.9069 },
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 }
                ]
            },
            "Day 4: 鈴鹿賽車場": {
                color: colors.day4,
                locations: [
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 },
                    { name: "🏁 鈴鹿賽車場", lat: 34.8438, lng: 136.5333 },
                    { name: "🥩 一升びん / 藏壽司 (鈴鹿)", lat: 34.8735, lng: 136.5658 },
                    { name: "🏠 Suzuka Inn 民宿", lat: 34.8780, lng: 136.5500 }
                ]
            },
            "Day 5: 鮮果與 Outlet": {
                color: colors.day5,
                locations: [
                    { name: "🏠 Suzuka Inn 民宿", lat: 34.8780, lng: 136.5500 },
                    { name: "🍇 Mitoka 體驗農園", lat: 35.5397, lng: 136.7871 },
                    { name: "🛍️ 長島三井 Outlet", lat: 35.0305, lng: 136.7350 },
                    { name: "🍲 木曾路 太平通店", lat: 35.1384, lng: 136.8643 },
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 }
                ]
            },
            "Day 6: 招財貓與回程": {
                color: colors.day6,
                locations: [
                    { name: "🏠 名古屋日航尚格酒店", lat: 35.1685, lng: 136.8879 },
                    { name: "🐱 常滑 AEON 商場", lat: 34.8966, lng: 136.8288 },
                    { name: "✈️ 中部國際機場 (還車)", lat: 34.8583, lng: 136.8115 }
                ]
            }
        };

        // 裝載每日圖層嘅 Object，用黎做 Layer Control
        const overlayMaps = {};

        // 迴圈處理每一日嘅數據
        for (const [dayName, dayData] of Object.entries(itinerary)) {
            const layerGroup = L.layerGroup(); // 建立獨立圖層
            const latlngs = [];

            dayData.locations.forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng]);
                marker.bindPopup(`<b>${loc.name}</b>`);
                layerGroup.addLayer(marker);
                latlngs.push([loc.lat, loc.lng]);
            });

            // 畫線
            const polyline = L.polyline(latlngs, {color: dayData.color, weight: 5, opacity: 0.8});
            layerGroup.addLayer(polyline);

            // 預設將 Day 1 加入地圖顯示
            if (dayName.includes("Day 1")) {
                layerGroup.addTo(map);
            }

            // 將圖層加入 Control 清單
            overlayMaps[`<span style="color:${dayData.color}; font-weight:bold;">${dayName}</span>`] = layerGroup;
        }

        // 加入右上角圖層控制器
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);
        
        // 加入用家實時定位功能 (PWA 必備)
        map.locate({setView: false, maxZoom: 16});
        map.on('locationfound', function(e) {
            L.circleMarker(e.latlng, {
                radius: 8,
                fillColor: "#0078ff",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(map).bindPopup("你喺呢度！");
        });

    </script>
</body>
</html>
