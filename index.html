<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        #map { height: 35vh; width: 100%; }
        #menu { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .day-btn { flex: 1 1 calc(33.333% - 6px); padding: 10px 0; background: #e0e0e0; border-radius: 8px; text-align: center; font-size: 13px; font-weight: bold; cursor: pointer; }
        .day-btn.active { background: #4285F4; color: white; }
        #preview-btn { width: 95%; margin: 10px auto; display: block; padding: 12px; background: #333; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .info-card { padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin: 10px; background: white; }
        .meta-box { font-size: 13px; color: #444; margin: 8px 0; padding: 8px; background: #f8f9fa; border-left: 4px solid #4285F4; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .btn { padding: 8px 2px; border-radius: 6px; text-align: center; color: white; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="preview-btn" onclick="alert('Hiace 注意事項: 嚴禁室內停車場，限高 2.1m 以下勿入！')">⚠️ Hiace 行車須知</button>
    <div id="menu">
        <div class="day-btn" id="btn-Day1" onclick="showDay('Day 1')">Day 1</div>
        <div class="day-btn" id="btn-Day2" onclick="showDay('Day 2')">Day 2</div>
        <div class="day-btn" id="btn-Day3" onclick="showDay('Day 3')">Day 3</div>
        <div class="day-btn" id="btn-Day4" onclick="showDay('Day 4')">Day 4</div>
        <div class="day-btn" id="btn-Day5" onclick="showDay('Day 5')">Day 5</div>
        <div class="day-btn" id="btn-Day6" onclick="showDay('Day 6')">Day 6</div>
    </div>
    <div id="details"></div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);
        
        const itinerary = {
            "Day 1": [{ name: "山本屋本店", time: "18:00", tel: "052-482-2428", addr: "愛知県名古屋市中村区太閤通6-5" }, { name: "日航尚格酒店", time: "20:00", tel: "052-211-8050", addr: "愛知県名古屋市中村区名駅5丁目20-13" }],
            "Day 2": [{ name: "樂高樂園", time: "10:00", tel: "0570-058-605", addr: "名古屋市港區金城埠頭" }, { name: "東別院夜市", time: "17:30", tel: "052-321-9201", addr: "愛知県名古屋市中区橘2丁目8-55" }],
            "Day 3": [{ name: "愛知牧場", time: "09:05", tel: "0561-72-1300", addr: "愛知県日進市米野木町" }, { name: "あつた蓬莱軒", time: "17:30", tel: "052-682-5598", addr: "愛知県名古屋市熱田区神戸町503" }],
            "Day 4": [{ name: "鈴鹿賽車場", time: "10:00", tel: "059-378-1111", addr: "三重県鈴鹿市稲生町7992" }],
            "Day 5": [{ name: "Mitoka 農園", time: "10:00", tel: "0581-78-5556", addr: "岐阜県山県市小倉726-1" }, { name: "長島三井Outlet", time: "14:15", tel: "0594-45-8700", addr: "三重県桑名市長島町浦安368" }, { name: "木曾路太平通店", time: "18:30", tel: "052-362-2321", addr: "愛知県名古屋市中川区太平通4丁目21" }],
            "Day 6": [{ name: "常滑 AEON", time: "10:00", tel: "0569-35-7500", addr: "愛知県常滑市りんくう町2丁目20-3" }]
        };

        function showDay(day) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + day.replace(' ', '')).classList.add('active');
            document.getElementById('details').innerHTML = itinerary[day].map(loc => `
                <div class="info-card">
                    <b>${loc.name} (${loc.time})</b>
                    <div class="meta-box">📍 ${loc.addr}<br>📞 <a href="tel:${loc.tel}">${loc.tel}</a></div>
                    <div class="btn-group">
                        <a href="https://www.google.com/maps/dir/?api=1&destination=$" class="btn" style="background:#4285F4">🚗 導航</a>
                        <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=$" class="btn" style="background:#00bcd4">👀 實景</a>
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfl-B4eJPRgQ-dlXdrVvjXaUOGqf3CJIMA9fXpodP6qRTBlzg/viewform" class="btn" style="background:#9c27b0">📸 收據</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
