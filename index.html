<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 40vh; width: 100%; }
        #menu { padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; background: #eee; }
        .day-btn { padding: 8px; background: #fff; border: 1px solid #ccc; border-radius: 5px; flex: 1; text-align: center; font-size: 13px; }
        #info-panel { height: 50vh; overflow-y: auto; padding: 15px; background: #fff; }
        .item { padding: 15px; border-bottom: 2px solid #f0f0f0; margin-bottom: 10px; }
        b { color: #d32f2f; font-size: 16px; }
        .desc { font-size: 13px; color: #333; margin: 5px 0; line-height: 1.4; }
        .tip { font-size: 12px; color: #d84315; background: #fff3e0; padding: 5px; border-radius: 4px; margin: 5px 0; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .nav-btn { flex: 1; background-color: #4285F4; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
        .view-btn { flex: 1; background-color: #34a853; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
        .park-btn { flex: 100%; background-color: #ff9800; color: white; padding: 8px; text-decoration: none; border-radius: 5px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="menu">
        <div class="day-btn" onclick="showDay('Day 1')">Day 1</div>
        <div class="day-btn" onclick="showDay('Day 2')">Day 2</div>
        <div class="day-btn" onclick="showDay('Day 3')">Day 3</div>
        <div class="day-btn" onclick="showDay('Day 4')">Day 4</div>
        <div class="day-btn" onclick="showDay('Day 5')">Day 5</div>
        <div class="day-btn" onclick="showDay('Day 6')">Day 6</div>
    </div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0;">請點選上方日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = [];

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", time: "16:00", desc: "攞車及整理行李，準備出發。", parking: "租車場", mapcode: "453 800 682*20", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", time: "18:00", desc: "經典味噌烏冬，熱騰騰好暖胃。", parking: "免費位", mapcode: "4 163 118*66", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", time: "20:00", desc: "Nikko Style Nagoya，舒適住宿。", parking: "酒店停車場", mapcode: "4 164 125*44", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "樂高樂園", time: "10:00", desc: "親子遊必去，園區超大，建議預留全日。", parking: "市營場，留意限高", mapcode: "52 485 581*57", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", time: "17:30", desc: "地道祭典氣氛，好多特色小食。", parking: "附近 Coin Parking", mapcode: "4 167 496*06", lat: 35.1481, lng: 136.9011 }
            ],
            "Day 3": [
                { name: "愛知牧場", time: "10:00", desc: "大草原親子樂，可以親近小動物。", parking: "大型露天免費場", mapcode: "100 241 180*25", lat: 35.1458, lng: 137.0817 },
                { name: "あつた蓬莱軒", time: "13:00", desc: "必食名古屋鰻魚飯，排隊人龍長。", parking: "專屬泊車區", mapcode: "4 137 775*86", lat: 35.1264, lng: 136.9069 }
            ],
            "Day 4": [
                { name: "鈴鹿賽車場", time: "10:00", desc: "賽車主題公園，玩足一日。", parking: "園區專用場 (極大)", mapcode: "159 387 508*68", lat: 34.8438, lng: 136.5333 },
                { name: "鈴鹿市酒店", time: "18:00", desc: "好好休息準備聽日行程。", parking: "免費停車場", mapcode: "-", lat: 34.8735, lng: 136.5658 }
            ],
            "Day 5": [
                { name: "Mitoka 農園", time: "10:00", desc: "體驗採摘樂趣，超新鮮水果。", parking: "露天場", mapcode: "178 304 630*81", lat: 35.5397, lng: 136.7871 },
                { name: "長島三井Outlet", time: "14:00", desc: "瘋狂掃貨，品牌極多。", parking: "立體場，留意 2.1m 高度", mapcode: "4 191 190*33", lat: 35.0305, lng: 136.7350 }
            ],
            "Day 6": [
                { name: "常滑 AEON", time: "11:00", desc: "最後衝刺買手信，呢度極大。", parking: "免費大停車場", mapcode: "205 383 671*88", lat: 34.8966, lng: 136.8288 },
                { name: "機場 (還車)", time: "15:00", desc: "準備還車，記得檢查無遺留物件。", parking: "租車歸還處", mapcode: "453 800 682*20", lat: 34.8583, lng: 136.8115 }
            ]
        };

        function showDay(day) {
            document.getElementById('panel-title').innerText = day + " 行程詳情";
            const details = document.getElementById('details');
            details.innerHTML = itinerary[day].map(loc => `
                <div class="item">
                    <b>${loc.name}</b> <small>(${loc.time})</small>
                    <div class="desc">${loc.desc}</div>
                    <div class="tip">🅿️ 泊車建議: ${loc.parking} | 📍 ${loc.mapcode}</div>
                    <div class="btn-group">
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank" class="nav-btn">🚗 導航</a>
                        <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=${loc.lat},${loc.lng}" target="_blank" class="view-btn">👀 實景</a>
                        <a href="https://www.google.com/maps/search/平置き+駐車場/@${loc.lat},${loc.lng}" target="_blank" class="park-btn">🅿️ 搵露天停車場</a>
                    </div>
                </div>
            `).join('');
            
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            itinerary[day].forEach(loc => {
                markers.push(L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(loc.name));
            });
            map.setView([itinerary[day][0].lat, itinerary[day][0].lng], 13);
        }
    </script>
</body>
</html>
