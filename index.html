<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>名古屋 6日5夜親子自駕遊 (2026終極版)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .popup-content { font-size: 14px; line-height: 1.5; }
        .popup-content b { color: #d32f2f; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([35.1676, 136.9060], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        const itinerary = {
            "Day 1: 抵達與榮區": {
                color: '#FF5722',
                locations: [
                    { name: "✈️ 中部國際機場", lat: 34.8583, lng: 136.8115, desc: "落機攞車，安頓行李 + BB 車。記得檢查胎壓與導航設定。" },
                    { name: "🍜 山本屋本店 大門本店", lat: 35.1743, lng: 136.8732, desc: "電話: 052-482-2428。正宗味噌煮烏冬，設有免費停車場。" },
                    { name: "🌃 Oasis 21 水之宇宙船", lat: 35.1706, lng: 136.9099, desc: "榮區夜景。⚠️嚴禁駛入室內場，請搵周邊露天Coin Parking。" }
                ]
            },
            "Day 2: 樂高與夜市": {
                color: '#2196F3',
                locations: [
                    { name: "🎢 樂高樂園 & SEA LIFE", lat: 35.0507, lng: 136.8436, desc: "泊市營金城埠頭停車場(¥1500)。SEA LIFE冷氣足，啱晒小朋友摸海星。" },
                    { name: "🏮 東別院 夏日夜市", lat: 35.1481, lng: 136.9011, desc: "電話: 052-321-9201。8號限定！掛滿燈籠，現場美食車掃街。" }
                ]
            },
            "Day 3: 牧場與巨公園": {
                color: '#4CAF50',
                locations: [
                    { name: "🪵 愛知牧場", lat: 35.1458, lng: 137.0817, desc: "電話: 0561-72-1300。餵羊駝 + 睇向日葵花海。" },
                    { name: "🛍️ LaLaport 名古屋港明", lat: 35.1098, lng: 136.8836, desc: "冷氣避暑首選，大型室外停車場。" },
                    { name: "🛝 戶田川綠地公園", lat: 35.1122, lng: 136.8143, desc: "超巨型滑梯放電區，Hiace泊車方便。" },
                    { name: "🍱 あつた蓬莱軒 (神宮店)", lat: 35.1264, lng: 136.9069, desc: "電話: 052-682-5598。必食鰻魚飯！務必預約神宮店以獲取室外車位。" }
                ]
            },
            "Day 4: 鈴鹿賽車場": {
                color: '#9C27B0',
                locations: [
                    { name: "🏁 鈴鹿賽車場", lat: 34.8438, lng: 136.5333, desc: "電話: 059-378-1111。幼童賽車樂園，注意戶外防曬。" },
                    { name: "🥩 一升びん (松阪牛) / 藏壽司", lat: 34.8735, lng: 136.5658, desc: "視體力決定食豪啲定輕鬆啲，兩者皆有大型露天停車場。" }
                ]
            },
            "Day 5: 鮮果與 Outlet": {
                color: '#E91E63',
                locations: [
                    { name: "🍇 Mitoka 體驗農園", lat: 35.5397, lng: 136.7871, desc: "電話: 0581-78-5556。摘葡萄+餵羊仔。特大停車場。" },
                    { name: "🛍️ 長島三井 Outlet", lat: 35.0305, lng: 136.7350, desc: "電話: 0594-45-8700。P2立體場低層最方便推BB車。" },
                    { name: "🍲 木曾路 太平通店", lat: 35.1384, lng: 136.8643, desc: "電話: 052-362-2321。已預約個室/榻榻米，享用壽喜燒。" }
                ]
            },
            "Day 6: 常滑 AEON": {
                color: '#607D8B',
                locations: [
                    { name: "🐱 常滑 AEON 商場", lat: 34.8966, lng: 136.8288, desc: "電話: 0569-35-7500。巨型招財貓打卡，藥妝最後衝刺。" },
                    { name: "✈️ 中部國際機場", lat: 34.8583, lng: 136.8115, desc: "入滿油(Regular)還車，機場丸屋鰻魚飯收尾。" }
                ]
            }
        };

        const overlayMaps = {};
        for (const [dayName, dayData] of Object.entries(itinerary)) {
            const layerGroup = L.layerGroup();
            dayData.locations.forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng]);
                marker.bindPopup(`<div class="popup-content"><b>${loc.name}</b><br>${loc.desc}</div>`);
                layerGroup.addLayer(marker);
            });
            overlayMaps[dayName] = layerGroup;
            if(dayName.includes("Day 1")) layerGroup.addTo(map);
        }
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);
    </script>
</body>
</html>
