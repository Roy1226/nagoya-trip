<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋 6日5夜親子自駕遊</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .popup-content { font-size: 14px; line-height: 1.4; }
        .popup-content b { display: block; margin-bottom: 5px; color: #d32f2f; }
        .hotel-info { background: #e8f5e9; padding: 5px; border-radius: 4px; font-size: 12px; margin: 5px 0; border-left: 3px solid #4caf50; }
        .parking-info { background: #fff3e0; padding: 5px; border-radius: 4px; font-size: 12px; margin: 5px 0; border-left: 3px solid #ff9800; }
        .nav-btn { display: inline-block; background-color: #4285F4; color: white !important; padding: 8px 12px; margin-top: 8px; text-decoration: none; border-radius: 5px; font-weight: bold; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const map = L.map('map').setView([35.1676, 136.9060], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        // --- 行程數據庫：已加入「住宿酒店」欄位 ---
        const itinerary = {
            "Day 1: 抵達與入住": { color: '#FF5722', locations: [
                { name: "機場 (攞車)", lat: 34.8583, lng: 136.8115, mapcode: "-", tel: "-", desc: "攞車前往酒店。", parking: "機場租車場", hotel: "" },
                { name: "名古屋觀光酒店", lat: 35.1675, lng: 136.8975, mapcode: "4 164 250*55", tel: "052-231-7711", desc: "今晚住宿。", parking: "酒店停車場", hotel: "入住酒店" }
            ]},
            // 你可以繼續加入其他日子的行程，格式如下：
            // { name: "酒店名稱", lat: 0, lng: 0, mapcode: "-", tel: "-", desc: "休息", parking: "泊車位", hotel: "住宿" }
        };

        const overlayMaps = {};
        for (const [dayName, dayData] of Object.entries(itinerary)) {
            const layerGroup = L.layerGroup();
            dayData.locations.forEach((loc, index) => {
                const navUrl = "https://www.google.com/maps/dir/?api=1&destination=LAT,LNG" + loc.lat + "," + loc.lng + "&travelmode=driving";
                
                // 顯示邏輯：如果有 hotel 欄位，就顯示酒店 icon
                const infoBox = loc.hotel ? `<div class="hotel-info">🏨 住宿: ${loc.name}</div>` : `<div class="parking-info">🅿️ 泊車: ${loc.parking}</div>`;
                
                const marker = L.marker([loc.lat, loc.lng]).addTo(layerGroup);
                marker.bindPopup(`
                    <div class="popup-content">
                        <b>${index === 0 ? '🟢 起點: ' : '📍 '}${loc.name}</b>
                        <p style="margin:5px 0;">Map: ${loc.mapcode}<br>Tel: ${loc.tel}</p>
                        ${infoBox}
                        <a href="${navUrl}" target="_blank" class="nav-btn">🚗 導航至此</a>
                    </div>
                `);
            });
            overlayMaps[dayName] = layerGroup;
            if(dayName.startsWith("Day 1")) layerGroup.addTo(map);
        }
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);
    </script>
</body>
</html>
