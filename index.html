<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 50vh; width: 100%; }
        #info-panel { height: 50vh; overflow-y: auto; padding: 15px; background: #fff; }
        .item { padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; font-size: 14px; }
        b { color: #d32f2f; font-size: 15px; }
        .nav-btn { display: inline-block; background-color: #4285F4; color: white; padding: 8px 12px; text-decoration: none; border-radius: 6px; font-size: 13px; margin-top: 6px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0; font-size: 18px;">請在地圖選取日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", time: "起始點", mapcode: "453 800 682*20", parking: "租車場", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", time: "40分", mapcode: "4 163 118*66", parking: "免費位", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", time: "15分", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "日航尚格酒店", time: "起始點", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 },
                { name: "樂高樂園", time: "30分", mapcode: "52 485 581*57", parking: "市營場", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", time: "25分", mapcode: "4 167 496*06", parking: "投幣場", lat: 35.1481, lng: 136.9011 }
            ]
            // (其餘日子格式以此類推)
        };

        const overlays = {};
        Object.keys(itinerary).forEach(day => {
            const group = L.layerGroup();
            const latlngs = itinerary[day].map(loc => [loc.lat, loc.lng]);
            
            // 繪製虛線路徑
            L.polyline(latlngs, { color: '#d32f2f', weight: 3, dashArray: '10, 10' }).addTo(group);

            itinerary[day].forEach((loc, index) => {
                let markerLabel = loc.name;
                if(index === 0) markerLabel = "🟢 " + loc.name;
                if(index === itinerary[day].length - 1) markerLabel = "🔴 " + loc.name;
                
                L.marker([loc.lat, loc.lng]).addTo(group).bindPopup(`<b>${markerLabel}</b><br>Mapcode: ${loc.mapcode}`);
            });
            overlays[day] = group;
        });
        L.control.layers(null, overlays, {collapsed: false}).addTo(map);

        map.on('overlayadd', (e) => {
            document.getElementById('panel-title').innerText = e.name + " 詳情";
            document.getElementById('details').innerHTML = itinerary[e.name].map((loc, index) => {
                let icon = "";
                if(index === 0) icon = "🟢";
                if(index === itinerary[e.name].length - 1) icon = "🔴";
                return `
                <div class="item">
                    <b>${icon} ${loc.name}</b> <small>(⏱ ${loc.time})</small><br>
                    📍 Mapcode: ${loc.mapcode} | 🅿️ ${loc.parking}<br>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank" class="nav-btn">🚗 導航至此</a>
                </div>
            `}).join('');
        });
    </script>
</body>
</html>
