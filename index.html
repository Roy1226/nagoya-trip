<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 50vh; width: 100%; }
        #info-panel { height: 50vh; overflow-y: auto; padding: 15px; background: #fff; }
        .item { padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; font-size: 14px; }
        b { color: #d32f2f; font-size: 15px; }
        .small-text { color: #555; font-size: 12px; }
        .nav-btn { display: inline-block; background-color: #4285F4; color: white; padding: 8px 12px; text-decoration: none; border-radius: 6px; font-size: 13px; margin-top: 6px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0; font-size: 18px;">請在地圖選取日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", tel: "-", time: "起始點", mapcode: "453 800 682*20", parking: "租車場", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", tel: "052-482-2428", time: "約 40 分鐘", mapcode: "4 163 118*66", parking: "免費位", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", tel: "052-211-8050", time: "約 15 分鐘", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "日航尚格酒店", tel: "052-211-8050", time: "起始點", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 },
                { name: "樂高樂園", tel: "0570-058-605", time: "約 30 分鐘", mapcode: "52 485 581*57", parking: "市營場", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", tel: "052-321-9201", time: "約 25 分鐘", mapcode: "4 167 496*06", parking: "投幣場", lat: 35.1481, lng: 136.9011 }
            ],
            "Day 3": [
                { name: "日航尚格酒店", tel: "052-211-8050", time: "起始點", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 },
                { name: "愛知牧場", tel: "0561-72-1300", time: "約 45 分鐘", mapcode: "100 241 180*25", parking: "大型免費場", lat: 35.1458, lng: 137.0817 },
                { name: "あつた蓬莱軒", tel: "052-682-5598", time: "約 40 分鐘", mapcode: "4 137 775*86", parking: "專屬停車區", lat: 35.1264, lng: 136.9069 }
            ],
            "Day 4": [
                { name: "鈴鹿賽車場", tel: "059-378-1111", time: "約 60 分鐘", mapcode: "159 387 508*68", parking: "園區專用場", lat: 34.8438, lng: 136.5333 },
                { name: "鈴鹿市區酒店", tel: "-", time: "約 15 分鐘", mapcode: "-", parking: "酒店專屬場", lat: 34.8735, lng: 136.5658 }
            ],
            "Day 5": [
                { name: "鈴鹿市區酒店", tel: "-", time: "起始點", mapcode: "-", parking: "酒店專屬場", lat: 34.8735, lng: 136.5658 },
                { name: "Mitoka 農園", tel: "0581-78-5556", time: "約 50 分鐘", mapcode: "178 304 630*81", parking: "免費車場", lat: 35.5397, lng: 136.7871 },
                { name: "長島三井Outlet", tel: "0594-45-8700", time: "約 50 分鐘", mapcode: "4 191 190*33", parking: "立體停車場", lat: 35.0305, lng: 136.7350 },
                { name: "日航尚格酒店", tel: "052-211-8050", time: "約 40 分鐘", mapcode: "4 164 125*44", parking: "酒店停車場", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 6": [
                { name: "日航尚格酒店", tel: "052-211-8050", time: "起始點", mapcode: "4 164 125*44", parking: "酒店停車場", lat: 35.1706, lng: 136.8920 },
                { name: "常滑 AEON", tel: "0569-35-7500", time: "約 35 分鐘", mapcode: "205 383 671*88", parking: "商場免費場", lat: 34.8966, lng: 136.8288 },
                { name: "機場 (還車)", tel: "-", time: "約 10 分鐘", mapcode: "453 800 682*20", parking: "租車還車處", lat: 34.8583, lng: 136.8115 }
            ]
        };

        const overlays = {};
        Object.keys(itinerary).forEach(day => {
            const group = L.layerGroup();
            itinerary[day].forEach(loc => {
                L.marker([loc.lat, loc.lng]).addTo(group).bindPopup(`<b>${loc.name}</b><br>預計車程: ${loc.time}`);
            });
            overlays[day] = group;
        });
        L.control.layers(null, overlays, {collapsed: false}).addTo(map);

        map.on('overlayadd', (e) => {
            document.getElementById('panel-title').innerText = e.name + " 詳情";
            document.getElementById('details').innerHTML = itinerary[e.name].map(loc => `
                <div class="item">
                    <b>${loc.name}</b> <span class="small-text">(⏱ ${loc.time})</span><br>
                    📍 Mapcode: ${loc.mapcode}<br>
                    📞 ${loc.tel} | 🅿️ ${loc.parking}<br>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving" target="_blank" class="nav-btn">🚗 導航至此</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
