<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; background-color: #f5f5f5; }
        #map { flex: 0 0 40vh; width: 100%; z-index: 1; }
        #menu { flex: 0 0 auto; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; background: #e0e0e0; z-index: 2; }
        .day-btn { flex: 1 1 calc(33.333% - 8px); padding: 10px 0; background: #fff; border: 2px solid #ccc; border-radius: 6px; text-align: center; font-size: 14px; font-weight: bold; color: #333; cursor: pointer; }
        .day-btn:active, .day-btn.active { background: #d32f2f; color: white; border-color: #d32f2f; }
        #info-panel { flex: 1 1 auto; overflow-y: auto; padding: 15px; background: #fff; }
        .item { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        b { color: #d32f2f; font-size: 16px; display: block; margin-bottom: 5px; }
        .tip { font-size: 13px; color: #333; background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 8px 0; border-left: 4px solid #4285F4; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .nav-btn, .view-btn, .park-btn { flex: 1 1 45%; color: white; padding: 10px 0; text-decoration: none; border-radius: 6px; text-align: center; font-size: 14px; font-weight: bold; }
        .nav-btn { background-color: #4285F4; }
        .view-btn { background-color: #34a853; }
        .park-btn { flex: 1 1 100%; background-color: #ff9800; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="menu">
        <div class="day-btn" id="btn-Day1" onclick="showDay('Day 1')">Day 1</div>
        <div class="day-btn" id="btn-Day2" onclick="showDay('Day 2')">Day 2</div>
        <div class="day-btn" id="btn-Day3" onclick="showDay('Day 3')">Day 3</div>
        <div class="day-btn" id="btn-Day4" onclick="showDay('Day 4')">Day 4</div>
        <div class="day-btn" id="btn-Day5" onclick="showDay('Day 5')">Day 5</div>
        <div class="day-btn" id="btn-Day6" onclick="showDay('Day 6')">Day 6</div>
    </div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0; font-size: 18px;">請點選上方日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = []; let polyline = null;

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", time: "16:00", tel: "-", mapcode: "453 800 682*20", addr: "愛知県常滑市セントレア1丁目1番地", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", time: "18:00", tel: "052-482-2428", mapcode: "4 163 118*66", addr: "愛知県名古屋市中村区太閤通6-5", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", time: "20:00", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "日航尚格酒店", time: "09:15", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 },
                { name: "樂高樂園", time: "10:00", tel: "0570-058-605", mapcode: "52 485 581*57", addr: "愛知県名古屋市港区金城ふ頭2丁目2-1", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", time: "17:30", tel: "052-321-9201", mapcode: "4 167 496*06", addr: "愛知県名古屋市中区橘2丁目8-55", lat: 35.1481, lng: 136.9011 },
                { name: "日航尚格酒店", time: "20:00", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 3": [
                { name: "日航尚格酒店", time: "08:30", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 },
                { name: "愛知牧場", time: "09:05", tel: "0561-72-1300", mapcode: "100 241 180*25", addr: "愛知県日進市米野木町南山977", lat: 35.1458, lng: 137.0817 },
                { name: "あつた蓬莱軒", time: "17:30", tel: "052-682-5598", mapcode: "4 137 775*86", addr: "愛知県名古屋市熱田区神戸町503", lat: 35.1264, lng: 136.9069 },
                { name: "日航尚格酒店", time: "20:00", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 4": [
                { name: "日航尚格酒店", time: "08:30", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 },
                { name: "鈴鹿賽車場", time: "10:00", tel: "059-378-1111", mapcode: "159 387 508*68", addr: "三重県鈴鹿市稲生町7992", lat: 34.8438, lng: 136.5333 },
                { name: "Suzuka Inn 民宿", time: "18:00", tel: "-", mapcode: "-", addr: "三重縣鈴鹿市內民宿", lat: 34.8735, lng: 136.5658 }
            ],
            "Day 5": [
                { name: "Suzuka Inn 民宿", time: "08:45", tel: "-", mapcode: "-", addr: "三重縣鈴鹿市內民宿", lat: 34.8735, lng: 136.5658 },
                { name: "Mitoka 農園", time: "10:00", tel: "0581-78-5556", mapcode: "178 304 630*81", addr: "岐阜県山県市小倉726-1", lat: 35.5397, lng: 136.7871 },
                { name: "長島三井Outlet", time: "14:15", tel: "0594-45-8700", mapcode: "4 191 190*33", addr: "三重県桑名市長島町浦安368", lat: 35.0305, lng: 136.7350 },
                { name: "木曾路太平通店", time: "18:30", tel: "052-362-2321", mapcode: "-", addr: "愛知県名古屋市中川区太平通4丁目21", lat: 35.1384, lng: 136.8643 },
                { name: "日航尚格酒店", time: "21:00", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 6": [
                { name: "日航尚格酒店", time: "09:20", tel: "052-211-8050", mapcode: "4 164 125*44", addr: "愛知県名古屋市中村区名駅5丁目20-13", lat: 35.1706, lng: 136.8920 },
                { name: "常滑 AEON", time: "10:00", tel: "0569-35-7500", mapcode: "205 383 671*88", addr: "愛知県常滑市りんくう町2丁目20-3", lat: 34.8966, lng: 136.8288 },
                { name: "機場 (還車)", time: "13:00", tel: "-", mapcode: "453 800 682*20", addr: "愛知県常滑市セントレア1丁目1番地", lat: 34.8583, lng: 136.8115 }
            ]
        };

        function showDay(day) {
            map.invalidateSize();
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + day.replace(' ', '')).classList.add('active');
            document.getElementById('panel-title').innerText = day + " 行程";
            const details = document.getElementById('details');
            details.innerHTML = itinerary[day].map((loc, i) => `
                <div class="item">
                    <b>${i===0?'🟢':(i===itinerary[day].length-1?'🔴':'📍')} ${loc.name} (${loc.time})</b>
                    <div class="tip">📍 Mapcode: ${loc.mapcode}<br>📞 Tel: ${loc.tel}<br>🗺️ 地址: ${loc.addr}</div>
                    <div class="btn-group">
                        <a href="https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}" class="view-btn">👀 地圖</a>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}&travelmode=driving" class="nav-btn">🚗 導航</a>
                        <a href="https://www.google.com/maps/search/parking+near+${loc.lat},${loc.lng}" class="park-btn">🅿️ 找停車場</a>
                    </div>
                </div>
            `).join('');
            markers.forEach(m => map.removeLayer(m)); markers = [];
            if (polyline) map.removeLayer(polyline);
            const pts = itinerary[day].map(l => [l.lat, l.lng]);
            itinerary[day].forEach(l => markers.push(L.marker([l.lat, l.lng]).addTo(map).bindPopup(l.name)));
            polyline = L.polyline(pts, { color: '#d32f2f', weight: 4, dashArray: '8,8' }).addTo(map);
            map.fitBounds(polyline.getBounds(), { padding: [30, 30] });
        }
    </script>
</body>
</html>
