<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊指揮中心</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f5; }
        #map { height: 40vh; width: 100%; }
        /* 調整選單樣式，使其更精緻 */
        #menu { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: #fff; border-bottom: 1px solid #ddd; }
        .day-btn { flex: 1 1 calc(33.333% - 6px); padding: 8px 0; background: #f0f0f0; border-radius: 20px; text-align: center; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .day-btn.active { background: #4285F4; color: white; }
        #preview-btn { width: 95%; margin: 10px auto; display: block; padding: 10px; background: #333; color: white; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        /* 其他樣式保持不變 */
        .info-card { padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .meta-box { font-size: 13px; color: #444; margin: 8px 0; padding: 8px; background: #f8f9fa; border-left: 4px solid #4285F4; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }
        .btn { padding: 8px 2px; border-radius: 6px; text-align: center; color: white; font-weight: bold; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <button id="preview-btn" onclick="togglePreview()">📋 全行程總覽</button>
    <div id="menu">
        <div class="day-btn" id="btn-Day1" onclick="showDay('Day 1')">Day 1</div>
        <div class="day-btn" id="btn-Day2" onclick="showDay('Day 2')">Day 2</div>
        <div class="day-btn" id="btn-Day3" onclick="showDay('Day 3')">Day 3</div>
        <div class="day-btn" id="btn-Day4" onclick="showDay('Day 4')">Day 4</div>
        <div class="day-btn" id="btn-Day5" onclick="showDay('Day 5')">Day 5</div>
        <div class="day-btn" id="btn-Day6" onclick="showDay('Day 6')">Day 6</div>
    </div>
    <div id="details"></div>

    <script>
        // 設定地圖為 Google Maps 街道圖風格
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: 'Map data &copy; Google'
        }).addTo(map);

        let markers = L.layerGroup().addTo(map);
        let polyline = L.polyline([], {color: '#4285F4', weight: 5, opacity: 0.8}).addTo(map);

        // (行程數據與之前一致，省略以節省空間，請繼續保留原有的 itinerary 對象)
        // ... [請將之前那份 itinerary 的代碼放回這裡] ...

        function showDay(day) {
            map.invalidateSize();
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + day.replace(' ', '')).classList.add('active');
            
            markers.clearLayers();
            const latlngs = itinerary[day].map(l => [l.lat, l.lng]);
            polyline.setLatLngs(latlngs);
            itinerary[day].forEach(l => L.marker([l.lat, l.lng]).addTo(markers).bindPopup(`<b>${l.name}</b><br>${l.addr}`));
            map.fitBounds(latlngs, { padding: [50, 50] });

            document.getElementById('details').innerHTML = itinerary[day].map(loc => `
                <div class="info-card">
                    <b>${loc.name} (${loc.time})</b>
                    <div class="meta-box">📍 ${loc.addr}<br>📞 <a href="tel:${loc.tel}">${loc.tel}</a><br>📟 ${loc.mapcode}</div>
                    <div class="btn-group">
                        <a href="${loc.url}" target="_blank" class="btn" style="background:#ff5722">🌐 官網</a>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=$${loc.lat},${loc.lng}" target="_blank" class="btn" style="background:#4285F4">🚗 導航</a>
                        <a href="https://www.google.com/maps/@?api=1&map_action=pano&viewpoint=$${loc.lat},${loc.lng}" target="_blank" class="btn" style="background:#00bcd4">👀 實景</a>
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfl-B4eJPRgQ-dlXdrVvjXaUOGqf3CJIMA9fXpodP6qRTBlzg/viewform" target="_blank" class="btn" style="background:#9c27b0">📸 收據</a>
                        <a href="https://www.google.com/maps/search/parking+near+$${loc.lat},${loc.lng}" target="_blank" class="btn" style="background:#ff9800">🅿️ 泊車</a>
                        <a href="https://www.google.com/maps/search/gas+station/" target="_blank" class="btn" style="background:#d32f2f">⛽ 油站</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
