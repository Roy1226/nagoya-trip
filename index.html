<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名古屋自駕遊</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        /* 手機版排版：改用垂直排列 */
        #map { height: 60vh; width: 100%; }
        #info-panel { height: 40vh; overflow-y: auto; padding: 15px; background: #fff; }
        
        .item { padding: 10px; border-bottom: 1px solid #eee; margin-bottom: 5px; font-size: 14px; }
        b { color: #d32f2f; }
        .nav-btn { display: inline-block; background-color: #4285F4; color: white; padding: 8px 12px; text-decoration: none; border-radius: 6px; font-size: 14px; margin-top: 5px; }
        
        /* 讓彈出視窗更好看 */
        .leaflet-popup-content-wrapper { width: 200px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="info-panel">
        <h2 id="panel-title" style="margin-top:0;">請在地圖選取日期</h2>
        <div id="details"></div>
    </div>

    <script>
        const map = L.map('map').setView([35.1676, 136.8920], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const itinerary = {
            "Day 1": [
                { name: "機場 (攞車)", tel: "-", mapcode: "453 800 682*20", parking: "租車場", lat: 34.8583, lng: 136.8115 },
                { name: "山本屋本店", tel: "052-482-2428", mapcode: "4 163 118*66", parking: "免費位", lat: 35.1743, lng: 136.8732 },
                { name: "日航尚格酒店", tel: "052-211-8050", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 }
            ],
            "Day 2": [
                { name: "日航尚格酒店", tel: "052-211-8050", mapcode: "4 164 125*44", parking: "酒店場", lat: 35.1706, lng: 136.8920 },
                { name: "樂高樂園", tel: "0570-058-605", mapcode: "52 485 581*57", parking: "市營場", lat: 35.0507, lng: 136.8436 },
                { name: "東別院夜市", tel: "052-321-9201", mapcode: "4 167 496*06", parking: "投幣場", lat: 35.1481, lng: 136.9011 }
            ]
        };

        const overlays = {};
        Object.keys(itinerary).forEach(day => {
            const group = L.layerGroup();
            itinerary[day].forEach(loc => {
                L.marker([loc.lat, loc.lng]).addTo(group).bindPopup(`<b>${loc.name}</b><br>Mapcode: ${loc.mapcode}`);
            });
            overlays[day] = group;
        });
        L.control.layers(null, overlays, {collapsed: false}).addTo(map);

        map.on('overlayadd', (e) => {
            document.getElementById('panel-title').innerText = e.name + " 詳情";
            document.getElementById('details').innerHTML = itinerary[e.name].map(loc => `
                <div class="item">
                    <b>${loc.name}</b><br>
                    📍 ${loc.mapcode}<br>
                    📞 ${loc.tel}<br>
                    🅿️ ${loc.parking}<br>
                    <a href="https://www.google.com/maps/dir/?api=1&destination=${loc.lat},${loc.lng}" target="_blank" class="nav-btn">🚗 導航至此</a>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
