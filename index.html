<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名古屋 6日5夜親子自駕遊</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .popup-content { font-size: 14px; line-height: 1.5; }
        .popup-content b { color: #d32f2f; display: block; margin-bottom: 3px; }
        .nav-btn {
            display: inline-block;
            background-color: #4285F4;
            color: white !important;
            padding: 8px 12px;
            margin-top: 10px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        const map = L.map('map').setView([35.1676, 136.9060], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            attribution: '© OpenStreetMap' 
        }).addTo(map);

        const itinerary = {
            "Day 1: 抵達與榮區": {
                color: '#FF5722',
                locations: [
                    { name: "機場 (攞車)", lat: 34.8583, lng: 136.8115, mapcode: "-", tel: "-", desc: "落機攞車，安頓行李。" },
                    { name: "山本屋本店", lat: 35.1743, lng: 136.8732, mapcode: "4 163 118*66", tel: "052-482-2428", desc: "味噌烏冬，有免費泊車。" },
                    { name: "Oasis 21", lat: 35.1706, lng: 136.9099, mapcode: "4 195 240*36", tel: "-", desc: "榮區夜景。⚠️嚴禁駛入室內場，搵露天車位。" }
                ]
            }
        };

        const overlayMaps = {};
        for (const [dayName, dayData] of Object.entries(itinerary)) {
            const layerGroup = L.layerGroup();
            dayData.locations.forEach((loc, index) => {
                // 修正連結格式，確保唔會有語法錯誤
                const navUrl = "https://www.google.com/maps/dir/?api=1&destination=" + loc.lat + "," + loc.lng + "&travelmode=driving";
                
                let distanceText = "";
                if (index < dayData.locations.length - 1) {
                    const nextLoc = dayData.locations[index + 1];
                    const d = map.distance([loc.lat, loc.lng], [nextLoc.lat, nextLoc.lng]) / 1000;
                    const time = Math.round(d / 40 * 60);
                    distanceText = `<p style="margin:8px 0; color:#555; font-size:12px; border-top:1px solid #eee; pt:5px;">➡️ 下一站距離: ${d.toFixed(1)} km (預估 ${time} 分鐘)</p>`;
                }

                const marker = L.marker([loc.lat, loc.lng]).addTo(layerGroup);
                marker.bindPopup(`
                    <div class="popup-content">
                        <b>${loc.name}</b>
                        <p style="margin:5px 0;">
                            📍 <b>Mapcode:</b> ${loc.mapcode}<br>
                            📞 <b>電話:</b> ${loc.tel}<br>
                            📝 ${loc.desc}
                        </p>
                        ${distanceText}
                        <a href="${navUrl}" target="_blank" class="nav-btn">🚗 導航至此</a>
                    </div>
                `);
            });
            overlayMaps[dayName] = layerGroup;
            if(dayName.includes("Day 1")) layerGroup.addTo(map);
        }
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);
    </script>
</body>
</html>
